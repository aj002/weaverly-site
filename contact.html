<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Weaverly</title>
  <!-- Google Fonts for Playfair Display and Helvetica Neue fallback -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <!-- Design System CSS -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <!-- Hero Section for Contact -->
  <section class="hero">
    <nav class="nav-absolute container">
      <div class="logo">Weaverly</div>
      <div class="nav-links">
        <a href="index.html#hero">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
    <div class="hero-content">
      <h1>Contact Us</h1>
      <p>Have questions or want to learn more? We’re here to help.</p>
    </div>
  </section>

  <!-- Contact Form Section -->
  <section class="section bg-white">
    <div class="container">
      <div class="card">
        <form action="#" method="post" class="grid grid-cols-1 md:grid-cols-2 gap-lg">
          <div>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" class="form-input" placeholder="Your name" required>
          </div>
          <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
          </div>
          <div class="md:col-span-2">
            <label for="message">Message</label>
            <textarea id="message" name="message" class="form-textarea" rows="6" placeholder="How can we help you?" required></textarea>
          </div>
          <div class="md:col-span-2 text-center mt-md">
            <button type="submit" class="btn btn-accent">Send Message</button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <!-- Visit Section -->
  <section class="section">
    <div class="container text-center">
      <h2>Find Us</h2>
      <p>Email us at <a href="mailto:weaverlygals@gmail.com">weaverlygals@gmail.com</a> or follow us on social media.</p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="section">
    <div class="container text-center">
      &copy; 2025 Weaverly. All rights reserved. | <a href="mailto:weaverlygals@gmail.com">weaverlygals@gmail.com</a>
    </div>
  </footer>
</body>
</html>
